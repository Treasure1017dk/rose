<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>玫瑰唱片 · 唯一玫瑰宋祖儿</title>
    <!-- 港风复古字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            /* 背景图 — 完整显示，不裁剪 */
            background-image: url('https://img2.tofaka.com/autoupload/yRnl-fAT622y8-9bMb7oA9iO_OyvX7mIgxFBfDMDErs/20260709/B8NF/673X1051/%E7%94%BB%E6%9D%BF_2.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #1a0f0f;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5vh 5vw 4vh;
            position: relative;
            color: #fff;
        }

        /* ===== 所有内容在遮罩之上 ===== */
        body>* {
            position: relative;
            z-index: 1;
        }

        /* ===== 顶部：品牌标识（港风字体） ===== */
        .brand-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: "Ma Shan Zheng", "华文楷体", "KaiTi", serif;
            font-size: clamp(14px, 2.2vw, 20px);
            font-weight: 400;
            letter-spacing: 2px;
            opacity: 0.9;
            padding: 0 2px;
            flex-shrink: 0;
        }
        .brand-top .left {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 14px;
            border-radius: 30px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: clamp(15px, 2.4vw, 22px);
        }
        .brand-top .right {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 14px;
            border-radius: 30px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: clamp(12px, 2vw, 18px);
            white-space: nowrap;
        }

        /* ===== 底部区域：标题 + 演唱者 + 播放器（固定在底部） ===== */
        .bottom-section {
            display: flex;
            flex-direction: column;
            gap: clamp(4px, 0.8vh, 10px);
            flex-shrink: 0;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 0 2px;
        }

        /* ===== 歌曲标题 — 港风复古字体，现在位于演唱者上方 ===== */
        .song-title {
            font-family: "Ma Shan Zheng", "华文楷体", "KaiTi", serif;
            font-size: clamp(22px, 5.5vw, 40px);
            font-weight: 400;
            letter-spacing: clamp(2px, 0.6vw, 6px);
            line-height: 1.3;
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6), 0 0 60px rgba(0, 0, 0, 0.3);
            padding: 0 6px;
            margin-bottom: clamp(6px, 1vh, 14px);
        }
        .song-title .title-icon {
            color: #dbb8ae;
            font-weight: 300;
            margin: 0 2px;
        }

        /* ===== 演唱者行（在播放器左上方，实体不透明） ===== */
        .artist-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: clamp(10px, 1.8vw, 18px);
            width: 100%;
            padding: 0 4px;
            margin-bottom: clamp(4px, 0.6vh, 10px);
            /* 实体不透明 */
            opacity: 1;
        }
        .artist-avatar {
            width: clamp(40px, 7vw, 56px);
            height: clamp(40px, 7vw, 56px);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
            object-fit: cover;
            flex-shrink: 0;
            background: #d9c8be;
        }
        .artist-label {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0px;
        }
        .artist-label .label {
            font-size: clamp(10px, 1.4vw, 14px);
            font-weight: 400;
            letter-spacing: 2px;
            color: #f0e0d8;
            opacity: 0.7;
        }
        .artist-label .name {
            font-family: "Ma Shan Zheng", "华文楷体", "KaiTi", serif;
            font-size: clamp(17px, 3vw, 26px);
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 1px 12px rgba(0, 0, 0, 0.5);
            /* 实体不透明 */
            opacity: 1;
        }

        /* 分隔装饰线 */
        .divider-line {
            width: 50%;
            height: 1px;
            margin: 0 auto 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 190, 0.25), transparent);
        }

        /* ===== 音频播放器（毛玻璃效果） ===== */
        .audio-player {
            background: rgba(0, 0, 0, 0.30);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: clamp(6px, 1.2vw, 12px) clamp(12px, 2vw, 20px) clamp(6px, 1.2vw, 12px) clamp(14px, 2.2vw, 24px);
            display: flex;
            align-items: center;
            gap: clamp(8px, 1.5vw, 16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            width: 100%;
        }
        #playBtn {
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            width: clamp(36px, 6vw, 48px);
            height: clamp(36px, 6vw, 48px);
            border-radius: 50%;
            font-size: clamp(16px, 2.6vw, 22px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.15s;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        #playBtn:active {
            transform: scale(0.88);
            background: rgba(255, 255, 255, 0.20);
        }
        .progress-bar {
            flex: 1;
            height: 3px;
            min-height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #f0d5c8;
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        .time-display {
            font-size: clamp(11px, 1.6vw, 14px);
            color: rgba(255, 255, 255, 0.55);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
            white-space: nowrap;
            min-width: clamp(64px, 10vw, 80px);
            text-align: right;
            font-weight: 300;
            flex-shrink: 0;
        }

        /* ===== 极小屏适配（< 360px） ===== */
        @media (max-width: 360px) {
            body {
                padding: 3vh 3vw 3vh;
            }
            .brand-top .left {
                font-size: 12px;
                padding: 1px 10px;
            }
            .brand-top .right {
                font-size: 10px;
                padding: 1px 10px;
            }
            .song-title {
                font-size: 18px;
                letter-spacing: 1px;
            }
            .artist-label .name {
                font-size: 14px;
            }
            .artist-avatar {
                width: 32px;
                height: 32px;
            }
            .artist-row {
                gap: 8px;
            }
            #playBtn {
                width: 30px;
                height: 30px;
                font-size: 13px;
            }
            .time-display {
                font-size: 10px;
                min-width: 56px;
            }
            .audio-player {
                padding: 5px 10px 5px 12px;
                gap: 6px;
            }
        }

        /* ===== 大屏适配（> 500px） ===== */
        @media (min-width: 500px) {
            body {
                padding: 6vh 8vw 5vh;
            }
            .bottom-section {
                max-width: 440px;
            }
        }

        /* ===== 横屏适配 ===== */
        @media (orientation: landscape) and (max-height: 500px) {
            body {
                padding: 2vh 6vw 2vh;
            }
            .song-title {
                font-size: clamp(16px, 4vh, 24px);
                margin-bottom: 4px;
            }
            .artist-row {
                margin-bottom: 4px;
            }
            .artist-avatar {
                width: 30px;
                height: 30px;
            }
            .artist-label .name {
                font-size: 14px;
            }
            .artist-label .label {
                font-size: 9px;
            }
            #playBtn {
                width: 30px;
                height: 30px;
                font-size: 13px;
            }
            .audio-player {
                padding: 4px 10px 4px 12px;
                gap: 8px;
            }
            .time-display {
                font-size: 10px;
                min-width: 56px;
            }
            .brand-top .left {
                font-size: 12px;
                padding: 1px 10px;
            }
            .brand-top .right {
                font-size: 10px;
                padding: 1px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部：品牌标识 -->
    <header class="brand-top">
        <span class="left">玫瑰唱片</span>
        <span class="right">🌹 唯一玫瑰宋祖儿</span>
    </header>

    <!-- 底部区域：标题 + 演唱者 + 播放器（固定在底部） -->
    <section class="bottom-section">
        <!-- 歌曲标题（现在位于演唱者上方） -->
        <h1 class="song-title">
            <span class="title-icon"></span>《羞答答的玫瑰静悄悄地开》<span class="title-icon"></span>
        </h1>

        <!-- 演唱者：在播放器左上方，实体不透明 -->
        <div class="artist-row">
            <img class="artist-avatar"
                 src="https://img2.tofaka.com/autoupload/yRnl-fAT622y8-9bMb7oA9iO_OyvX7mIgxFBfDMDErs/20260709/PRkj/886X886/%E7%BA%A2%E7%8E%AB%E7%91%B0.jpg"
                 alt="头像">
            <div class="artist-label">
                <span class="label">✦ 演唱者</span>
                <span class="name">@宋祖儿lareina</span>
            </div>
        </div>

        <!-- 装饰分隔线 -->
        <div class="divider-line"></div>

        <!-- 音频播放器（最底部） -->
        <div class="audio-player">
            <button id="playBtn" aria-label="播放/暂停">▶</button>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
        </div>
    </section>

    <!-- 音频 -->
    <audio id="audioPlayer"
           src="https://img2.tofaka.com/autoupload/yRnl-fAT622y8-9bMb7oA9iO_OyvX7mIgxFBfDMDErs/20260709/1GU4/%E7%BE%9E%E7%AD%94%E7%AD%94%E7%9A%84%E7%8E%AB%E7%91%B0%E9%9D%99%E6%82%84%E6%82%84%E5%9C%B0%E5%BC%80.mp3"
           preload="metadata">
</audio>

<script>
    (function() {
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds) || seconds < 0) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        function updateProgress() {
            if (audio.duration && isFinite(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = Math.min(percent, 100) + '%';
                timeDisplay.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
            } else {
                timeDisplay.textContent = '0:00 / 0:00';
            }
        }

        audio.addEventListener('loadedmetadata', function() {
            if (audio.duration && isFinite(audio.duration)) {
                timeDisplay.textContent = formatTime(0) + ' / ' + formatTime(audio.duration);
            }
        });

        audio.addEventListener('timeupdate', updateProgress);

        audio.addEventListener('ended', function() {
            playBtn.textContent = '▶';
            progressFill.style.width = '0%';
            if (audio.duration && isFinite(audio.duration)) {
                timeDisplay.textContent = formatTime(0) + ' / ' + formatTime(audio.duration);
            } else {
                timeDisplay.textContent = '0:00 / 0:00';
            }
        });

        playBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (audio.paused) {
                audio.play().catch(function() {
                    // 用户手势触发播放，无需额外提示
                });
                playBtn.textContent = '⏸';
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        });

        progressBar.addEventListener('click', function(e) {
            if (!audio.duration || !isFinite(audio.duration)) return;
            const rect = this.getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            audio.currentTime = percent * audio.duration;
            if (audio.paused) updateProgress();
        });

        audio.addEventListener('error', function() {
            timeDisplay.textContent = '⚠️ 音频加载失败';
        });

        // 初始显示
        setTimeout(updateProgress, 100);
    })();
</script>

</body>
</html>
